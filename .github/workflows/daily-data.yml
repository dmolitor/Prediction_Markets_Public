name: Daily Data Update

on:
  schedule:
    - cron: "0 5 * * *"   # every day at 05:00 UTC
  workflow_dispatch:       # allow manual triggering too

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------
      # Python setup
      # -----------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pandas python-dotenv cryptography requests websockets

      - name: Run Python scraping script
        env:
          KALSHI_KEYID: ${{ secrets.KALSHI_KEYID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python code/kalshi_scraping/scrape_kalshi_trades.py

      # -----------------------
      # R setup
      # -----------------------
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

          

      - name: Install R dependencies
        run: |
          install.packages(c("tidyverse", "lubridate", "matrixStats"), 
                          repos = c("https://packagemanager.posit.co/cran/__linux__/jammy/latest", 
                                   "https://cloud.r-project.org"))
        shell: Rscript {0}


      - name: Run R script to convert to PDFs and Moments Data
        run: Rscript code/convert_trades_to_pdfs/data_convert_runner.R


      # -----------------------
      # Upload to AWS S3
      # -----------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync data to S3
        run: |
          aws s3 sync data/daily_bid_ask_distribution_data s3://kalshi-and-the-rise-of-macro-markets/daily_bid_ask_distribution_data
          aws s3 sync data/daily_bid_ask_moments_data s3://kalshi-and-the-rise-of-macro-markets/daily_bid_ask_moments_data
          aws s3 sync data/daily_distribution_data s3://kalshi-and-the-rise-of-macro-markets/daily_distribution_data
          aws s3 sync data/daily_moments_data s3://kalshi-and-the-rise-of-macro-markets/daily_moments_data
          echo $(date) > data/last_updated.txt
          aws s3 cp data/last_updated.txt s3://kalshi-and-the-rise-of-macro-markets/
