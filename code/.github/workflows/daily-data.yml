name: Daily Data Update

on:
  schedule:
    - cron: "0 5 * * *"   # every day at 05:00 UTC
  workflow_dispatch:       # allow manual triggering too

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------
      # Python setup
      # -----------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pandas python-dotenv cryptography
          

      - name: Run Python scraping script
        env:
          KALSHI_KEYID: ${{ secrets.KALSHI_KEYID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: python code/kalshi_scraping/scrape_kalshi_trades.py

      # -----------------------
      # R setup
      # -----------------------
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("tidyverse","lubridate","av","matrixStats","gganimate"), repos="https://cloud.r-project.org")'

      - name: Run R script (CDFs)
        run: Rscript code/convert_trades_to_pdf/convert_trade_level_data_cdfs.R

      - name: Run R script (PDFs)
        run: Rscript code/convert_trades_to_pdf/convert_trade_level_data_pdfs.R

      # -----------------------
      # Commit results
      # -----------------------
      - name: Commit updated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/* || true
          git commit -m "Daily data update" || echo "No changes to commit"
          git push
